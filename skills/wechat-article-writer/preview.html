<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信公众号文章预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        
        .header-cover {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .content {
            padding: 30px;
        }
        
        .title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        .meta {
            display: flex;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-right: 12px;
        }
        
        .author-info {
            flex: 1;
        }
        
        .author-name {
            font-size: 15px;
            font-weight: 600;
            color: #333;
        }
        
        .publish-time {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .article-body {
            font-size: 16px;
            line-height: 1.8;
            color: #333;
        }
        
        .article-body h2 {
            font-size: 18px;
            color: #333;
            margin: 25px 0 15px;
            padding-left: 10px;
            border-left: 4px solid #ff6b6b;
        }
        
        .article-body p {
            margin: 15px 0;
        }
        
        .article-body strong {
            font-weight: 600;
        }
        
        .article-body blockquote {
            background: #f9f9f9;
            border-left: 4px solid #ddd;
            padding: 15px 20px;
            margin: 20px 0;
            color: #666;
            font-style: italic;
        }
        
        .article-body ul, .article-body ol {
            margin: 15px 0;
            padding-left: 20px;
        }
        
        .article-body li {
            margin: 8px 0;
        }
        
        .article-body img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .share-cover-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px dashed #eee;
        }
        
        .share-cover-section h3 {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
        }
        
        .share-cover {
            width: 383px;
            height: 383px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .file-info {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
        
        .file-info p {
            margin: 5px 0;
        }
        
        .tag {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 8px;
        }
        
        .article-selector {
            background: #fff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .article-selector h3 {
            margin-bottom: 15px;
            color: #333;
        }
        
        .article-selector button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            margin-right: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .article-selector button:hover {
            background: #5568d3;
        }
        
        .article-selector button.active {
            background: #4c51bf;
        }
    </style>
</head>
<body>
    <div class="article-selector">
        <h3>📝 选择文章预览</h3>
        <button onclick="loadArticle(1)" id="btn1" class="active">文章 1：臀肌挛缩康复</button>
        <button onclick="loadArticle(2)" id="btn2">文章 2：髂胫束综合症</button>
    </div>
    
    <div class="container" id="article-container">
        <!-- 内容将通过 JS 动态加载 -->
    </div>
    
    <script>
        const articles = {
            1: {
                title: "臀肌挛缩不用开刀？这份非手术康复指南，90% 的人都不知道！",
                cover: "./scripts/output/images/cover_20260309_230002.jpg",
                shareCover: "./scripts/output/images/cover_20260309_230025.jpg",
                md: "./scripts/output/articles/article_20260309_225017.md",
                wordCount: 2659,
                style: "干货",
                time: "2026-03-09 22:50"
            },
            2: {
                title: "一拉就痛？膝盖外侧"筋"绷紧了！髂胫束综合征自救全攻略 🦵",
                cover: "./scripts/output/images/cover_20260309_230735.jpg",
                shareCover: "./scripts/output/images/cover_20260309_230756.jpg",
                md: "./scripts/output/articles/article_20260309_230714.md",
                wordCount: 2949,
                style: "干货",
                time: "2026-03-09 23:07"
            }
        };
        
        let currentArticle = 1;
        
        function loadArticle(id) {
            currentArticle = id;
            const article = articles[id];
            
            // 更新按钮状态
            document.getElementById('btn1').classList.toggle('active', id === 1);
            document.getElementById('btn2').classList.toggle('active', id === 2);
            
            // 加载文章内容
            fetch(article.md)
                .then(response => response.text())
                .then(markdown => {
                    // Markdown 转 HTML
                    let html = markdown
                        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                        .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                        .replace(/\*(.*)\*/gim, '<em>$1</em>')
                        .replace(/^- (.*$)/gim, '<li>$1</li>')
                        .replace(/!\[(.*?)\]\((.*?)\)/gim, '<img src="$2" alt="$1">')
                        .replace(/\n/gim, '<br>');
                    
                    renderArticle(article, html);
                })
                .catch(err => {
                    console.error('加载失败:', err);
                    document.getElementById('article-container').innerHTML = `
                        <div class="content">
                            <p style="color: red;">文章加载失败，请检查文件路径</p>
                        </div>
                    `;
                });
        }
        
        function renderArticle(article, content) {
            document.getElementById('article-container').innerHTML = `
                <img class="header-cover" src="${article.cover}" alt="文章封面">
                
                <div class="content">
                    <h1 class="title">${article.title}</h1>
                    
                    <div class="meta">
                        <div class="avatar"></div>
                        <div class="author-info">
                            <div class="author-name">AI 助手</div>
                            <div class="publish-time">${article.time} · 阅读约 ${Math.ceil(article.wordCount / 300)} 分钟</div>
                        </div>
                        <div>
                            <span class="tag">${article.style}</span>
                            <span class="tag">康复</span>
                            <span class="tag">健康</span>
                        </div>
                    </div>
                    
                    <div class="article-body">
                        ${content}
                    </div>
                    
                    <div class="share-cover-section">
                        <h3>📱 分享封面预览（1:1，用于朋友圈/聊天分享）</h3>
                        <img class="share-cover" src="${article.shareCover}" alt="分享封面">
                        
                        <div class="file-info">
                            <p><strong>📄 文章信息</strong></p>
                            <p>字数：${article.wordCount} 字</p>
                            <p>风格：${article.style}</p>
                            <p>生成时间：${article.time}</p>
                            <p>文件：${article.md.split('/').pop()}</p>
                        </div>
                        
                        <div class="file-info">
                            <p><strong>🖼️ 封面图信息</strong></p>
                            <p>头条封面：900×383 像素（output/images/cover_xxx_header.jpg）</p>
                            <p>分享封面：383×383 像素（output/images/cover_xxx_share.jpg）</p>
                            <p>AI 模型：豆包 Seedream 4.5</p>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // 默认加载第一篇文章
        loadArticle(1);
    </script>
</body>
</html>
