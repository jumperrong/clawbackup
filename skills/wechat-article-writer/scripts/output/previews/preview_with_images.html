<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公众号文章预览</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.8;
      color: #333;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 677px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .cover-image {
      width: 100%;
      height: auto;
      margin-bottom: 30px;
      border-radius: 8px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 20px;
      color: #000;
    }
    h2 {
      font-size: 18px;
      font-weight: 600;
      margin: 30px 0 15px;
      color: #000;
      border-left: 4px solid #07c160;
      padding-left: 12px;
    }
    img {
      max-width: 100%;
      height: auto;
      margin: 20px 0;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>文章 1：臀肌挛缩康复指南</h1>

    <hr style="margin: 40px 0; border: none; border-top: 1px solid #e0e0e0;">

    <img src="file:///Users/jumpermac/.openclaw/workspace/skills/wechat-article-writer/scripts/output/images/cover_20260309_230735.jpg" alt="封面图" class="cover-image">

</html>
